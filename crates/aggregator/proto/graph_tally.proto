syntax = "proto3";
package graph_tally;

message Uint128 {
  // Highest 64 bits of a 128 bit number.
  uint64 high = 1;
  // Lowest 64 bits of a 128 bit number.
  uint64 low = 2;
}

message Receipt {
  bytes collection_id = 1;
  bytes payer = 2;
  bytes data_service = 3;
  bytes service_provider = 4;
  uint64 timestamp_ns = 5;
  uint64 nonce = 6;
  Uint128 value = 7;
}

message SignedReceipt {
  Receipt message = 1;
  bytes signature = 2;
}

message ReceiptAggregateVoucher {
  bytes collection_id = 1;
  bytes payer = 2;
  bytes data_service = 3;
  bytes service_provider = 4;
  uint64 timestamp_ns = 5;
  Uint128 value_aggregate = 6;
  bytes metadata = 7;
}

message SignedRav {
  ReceiptAggregateVoucher message = 1;
  bytes signature = 2;
}

message RavRequest {
  repeated SignedReceipt receipts = 1;
  optional SignedRav previous_rav = 2;
}

message RavResponse {
  SignedRav rav = 1;
}

service GraphTallyAggregator {
  rpc AggregateReceipts(RavRequest) returns (RavResponse);
}
